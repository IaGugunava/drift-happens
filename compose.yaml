services:
  backend:
    build:
      context: ./drift-happens-backend
    container_name: drift-happens-backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGO_URI: mongodb://mongodb:27017/drift
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      ELASTICSEARCH_NODE: http://elasticsearch:9200
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./drift-happens-frontend
    container_name: drift-happens-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_API_BASE_INTERNAL: http://backend:8080
      NUXT_PUBLIC_API_BASE: http://localhost:8080
      NUXT_PUBLIC_SOCKET_BASE: http://localhost:8080
    ports:
      - "3000:3000"

  mongodb:
    image: mongo:7
    container_name: drift-happens-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: drift-happens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: drift-happens-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: drift-happens-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

volumes:
  mongo_data:
  es_data:
